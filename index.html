<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unknown Modz | Secure Gateway</title>
    <style>
        :root { --accent: #00ff00; --bg: #0a0a0a; --card: #151515; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid #222; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(0,255,0,0.05); position: relative; }
        h1 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .status { color: #888; font-size: 12px; margin-bottom: 20px; }
        
        /* --- REMOVE UP/DOWN ARROWS --- */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield; /* Firefox fix */
        }
        /* ---------------------------- */

        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; text-align: center; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--accent); }
        
        #result { background: #000; padding: 20px; border-radius: 12px; border: 1px dashed var(--accent); margin-top: 20px; display: none; animation: fadeIn 0.5s ease; }
        .key-text { font-family: monospace; color: var(--accent); font-size: 18px; font-weight: bold; margin-bottom: 15px; display: block; word-break: break-all; }
        .error-box { background: rgba(255, 0, 0, 0.1); border: 1px solid #ff4444; padding: 15px; border-radius: 10px; display: none; margin-bottom: 20px; }
        
        button { width: 100%; padding: 15px; background: var(--accent); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 14px; }
        button:hover { transform: scale(1.02); background: #00cc00; }
        
        .copy-btn { background: #222; color: var(--accent); border: 1px solid var(--accent); margin-top: 10px; padding: 10px; font-size: 12px; }
        .copy-btn:hover { background: var(--accent); color: black; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Unknown Modz</h1>
        <div id="authContent">
            <div id="errorArea" class="error-box">
                <span style="color: #ff4444; font-weight: bold;">BYPASS DETECTED</span><br>
                <small style="font-size: 10px;">Please use the official link from the script.</small>
            </div>

            <div id="formArea" style="display: none;">
                <p class="status">Session Verified ✅</p>
                <input type="number" id="userIdInput" placeholder="Enter Roblox UserID" inputmode="numeric">
                <button onclick="processAuth()">Generate Key</button>
            </div>
            
            <button id="retryBtn" onclick="location.href='https://lootdest.org/s?yh8OnyLN'" style="display: none; background: #333; color: white; margin-top: 10px;">Return to Shortener</button>
        </div>

        <div id="result">
            <div style="font-size: 10px; color: #555; margin-bottom: 8px;">YOUR 24H KEY:</div>
            <span id="keyDisplay" class="key-text"></span>
            <button class="copy-btn" id="copyBtn" onclick="copyKey()">Copy Key to Clipboard</button>
            <p id="copyStatus" style="font-size: 10px; color: #00ff00; margin-top: 10px; display: none;">Copied Successfully!</p>
        </div>
    </div>

    <script>
        const REQUIRED_REF = "lootdest.org";
        const currentRef = document.referrer;

        window.onload = function() {
            if (currentRef.includes(REQUIRED_REF) || window.location.search.includes("debug=true")) {
                document.getElementById('formArea').style.display = "block";
            } else {
                document.getElementById('errorArea').style.display = "block";
                document.getElementById('retryBtn').style.display = "block";
            }
        };

        function processAuth() {
            const uid = document.getElementById('userIdInput').value;
            if (uid.length < 5) return alert("Invalid UserID");

            const lock = localStorage.getItem("um_lock");
            const lockTime = localStorage.getItem("um_time");
            const now = Date.now();

            if (lockTime && (now - lockTime > 86400000)) { localStorage.clear(); }
            if (!localStorage.getItem("um_lock")) {
                localStorage.setItem("um_lock", uid);
                localStorage.setItem("um_time", now);
            }

            if (uid !== localStorage.getItem("um_lock")) {
                alert("Locked to ID: " + localStorage.getItem("um_lock"));
                return;
            }

            const day = Math.floor(Date.now() / 86400000);
            let seed = parseInt(uid) + day;
            function rnd() { var x = Math.sin(seed++) * 10000; return Math.abs(x - Math.floor(x)); }
            
            let res = [];
            for(let i=0; i<4; i++) {
                let s = "";
                for(let j=0; j<4; j++) s += Math.floor(rnd() * 10);
                res.push(s);
            }

            const finalKey = "Unknown-Modz-" + res.join("-");
            document.getElementById('keyDisplay').innerText = finalKey;
            document.getElementById('result').style.display = "block";
            document.getElementById('authContent').style.display = "none";
        }

        function copyKey() {
            const keyText = document.getElementById('keyDisplay').innerText;
            navigator.clipboard.writeText(keyText).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerText = "COPIED!";
                setTimeout(() => { btn.innerText = "Copy Key to Clipboard"; }, 2000);
            });
        }
    </script>
</body>
</html>
