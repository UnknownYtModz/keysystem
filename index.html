<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unknown Modz | Authentication</title>
    <style>
        :root { --accent: #00ff00; --bg: #0a0a0a; --card: #151515; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid #222; text-align: center; width: 90%; max-width: 400px; }
        h1 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        .key-box { background: #000; padding: 15px; border-radius: 10px; border: 1px dashed var(--accent); margin-top: 20px; display: none; }
        .key-text { font-family: monospace; color: var(--accent); font-size: 18px; font-weight: bold; }
        .error { color: #ff4444; font-weight: bold; display: none; }
        button { width: 100%; padding: 15px; background: var(--accent); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        button:disabled { background: #333; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container" id="mainContent">
    <h1>Unknown Modz</h1>
    <p id="statusMsg">Verify your session to generate key.</p>
    
    <div id="errorMsg" class="error">⚠️ NO BYPASSING ALLOWED<br><small>You must go through the official link.</small></div>

    <button id="genBtn" onclick="processKey()">Get My Key</button>

    <div id="resultBox" class="key-box">
        <div style="font-size: 10px; color: #888; margin-bottom: 5px;">YOUR UNIQUE 24H KEY:</div>
        <div id="keyValue" class="key-text"></div>
    </div>
</div>

<script>
    // 1. SECURITY CHECK: Check if the user came from your redirect link
    // Note: document.referrer checks where the user clicked from.
    const validReferrer = "alvinchristian1118-code.github.io"; 
    const isDirect = document.referrer === "" || !document.referrer.includes(validReferrer);

    if (isDirect) {
        document.getElementById('genBtn').disabled = true;
        document.getElementById('statusMsg').style.display = "none";
        document.getElementById('errorMsg').style.display = "block";
    }

    function processKey() {
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('hwid'); 

    if (!userId) {
        // If they try to bypass, show the error
        document.getElementById('errorMsg').style.display = "block";
        document.getElementById('genBtn').style.display = "none";
        return;
    }

        const dayStamp = Math.floor(Date.now() / 86400000);
        let seed = parseInt(userId) + dayStamp;

        function seededRandom() {
            var x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }

        let parts = [];
        for (let i = 0; i < 4; i++) {
            let seg = "";
            for (let j = 0; j < 4; j++) { seg += Math.floor(seededRandom() * 10); }
            parts.push(seg);
        }

        document.getElementById('keyValue').innerText = "Unknown-Modz-" + parts.join("-");
        document.getElementById('resultBox').style.display = "block";
        document.getElementById('genBtn').style.display = "none";
    }
</script>
</body>
</html>
